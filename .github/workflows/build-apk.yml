name: Build APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "android_studio/gradlew" ]; then
            chmod +x android_studio/gradlew
          fi

      - name: Build Debug APK
        run: |
          if [ -f "android_studio/gradlew" ]; then
            cd android_studio
            ./gradlew assembleDebug
          elif [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Release APK
        run: |
          if [ -f "android_studio/gradlew" ]; then
            cd android_studio
            ./gradlew assembleRelease
          elif [ -f "gradlew" ]; then
            ./gradlew assembleRelease
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gnunet-debug-apk
          path: |
            android_studio/app/build/outputs/apk/debug/
            app/build/outputs/apk/debug/
          retention-days: 7

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gnunet-release-apk
          path: |
            android_studio/app/build/outputs/apk/release/
            app/build/outputs/apk/release/
          retention-days: 7

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android_studio/app/build/outputs/apk/release/**/*.apk
            app/build/outputs/apk/release/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
