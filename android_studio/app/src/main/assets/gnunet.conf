[arm]
HOSTNAME = localhost
BINARY = gnunet-service-arm
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-arm.sock
UNIX_MATCH_UID = YES
UNIX_MATCH_GID = YES
GLOBAL_PREFIX = 
OPTIONS = -l $GNUNET_CACHE_HOME/gnunet-%Y-%m-%d.log
CONFIG = /home/gnunet21/gnunet.conf

[cadet]
IMMEDIATE_START = YES
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-cadet
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-cadet.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
REFRESH_CONNECTION_TIME = 5 min
ID_ANNOUNCE_TIME = 1 h
CONNECT_TIMEOUT = 30 s
DHT_REPLICATION_LEVEL = 3
MAX_CONNECTIONS = 1000
MAX_ROUTES = 5000
MAX_MSGS_QUEUE = 10000
MAX_PEERS = 1000
RATCHET_TIME = 1 h
RATCHET_MESSAGES = 64

[core]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-core
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-core.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
USE_EPHEMERAL_KEYS = YES

[datastore]
START_ON_DEMAND = YES
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-datastore.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
HOSTNAME = localhost
BINARY = gnunet-service-datastore
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
QUOTA = 500 MB
BLOOMFILTER = $GNUNET_DATA_HOME/datastore/bloomfilter
DATABASE = sqlite

[datastore-sqlite]
FILENAME = $GNUNET_DATA_HOME/datastore/sqlite.db

[datastore-heap]
HASHMAPSIZE = 1024

[dht]
IMMEDIATE_START = YES
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-dht
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
BUCKET_SIZE = 4
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-dht.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
CACHE_RESULTS = YES
DISABLE_TRY_CONNECT = NO

[dhtcache]
DATABASE = heap
QUOTA = 50 MB
DISABLE_BF_RC = NO

[dhtu-gnunet]
ENABLED = YES

[dns]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-dns
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-dns.sock
UNIX_MATCH_UID = YES
UNIX_MATCH_GID = YES
IFNAME = gnunet-dns
IPV6ADDR = 2001:DB8::1
IPV6PREFIX = 126
IPV4ADDR = 169.254.1.1
IPV4MASK = 255.255.0.0
DNS_EXIT = 8.8.8.8

[fs]
RUN_PER_USER = YES
START_ON_DEMAND = YES
IMMEDIATE_START = YES
INDEXDB = $GNUNET_DATA_HOME/fs/idxinfo.lst
RESPECT = $GNUNET_DATA_HOME/fs/credit/
STATE_DIR = $GNUNET_DATA_HOME/fs/persistence/
UPDATE_DIR = $GNUNET_DATA_HOME/fs/updates/
HOSTNAME = localhost
BINARY = gnunet-service-fs
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
DELAY = YES
CONTENT_CACHING = YES
CONTENT_PUSHING = YES
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-fs.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
MAX_PENDING_REQUESTS = 65536
DATASTORE_QUEUE_SIZE = 32
MIN_MIGRATION_DELAY = 100 ms
EXPECTED_NEIGHBOUR_COUNT = 128
DISABLE_ANON_TRANSFER = NO
MAX_CADET_CLIENTS = 128

[gns]
START_ON_DEMAND = YES
IMMEDIATE_START = YES
HOSTNAME = localhost
BINARY = gnunet-service-gns
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-gns.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
MAX_PARALLEL_BACKGROUND_QUERIES = 1000
INTERCEPT_DNS = NO
.pin.gns.alt = 000G0522TTKQESZ9KPRT2K0RA9ZC8YMD52D2XYVYVGPDCNPMWHH9QXXF4W
.gnunet.gns.alt = 000G0522TTKQESZ9KPRT2K0RA9ZC8YMD52D2XYVYVGPDCNPMWHH9QXXF4W

[hostlist]
IMMEDIATE_START = YES
NOARMBIND = YES
BINARY = gnunet-daemon-hostlist
HTTPPORT = 8080
HOSTLISTFILE = $GNUNET_CONFIG_HOME/hostlist/learned.txt
ADVERTISING = YES
BOOTSTRAPPING = YES
LEARNING = YES
PROVIDE_HOSTLIST = NO
SERVERS = https://bootstrap.gnunet.org/v22

[identity]
START_ON_DEMAND = YES
RUN_PER_USER = YES
HOSTNAME = localhost
BINARY = gnunet-service-identity
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-identity.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
EGODIR = $GNUNET_DATA_HOME/identity/egos/
SUBSYSTEM_CFG = $GNUNET_CONFIG_HOME/identity/subsystem_defaults.conf

[messenger]
START_ON_DEMAND = YES
RUN_PER_USER = YES
HOSTNAME = localhost
BINARY = gnunet-service-messenger
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-messenger.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
MESSENGER_DIR = $GNUNET_DATA_HOME/messenger/
MESSENGER_AUTO_CONNECTING = YES
MESSENGER_AUTO_ROUTING = YES
MESSENGER_MIN_ROUTERS = 3

[namecache]
START_ON_DEMAND = YES
RUN_PER_USER = NO
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-namecache.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
HOSTNAME = localhost
BINARY = gnunet-service-namecache
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
DATABASE = sqlite
DISABLE = NO

[namecache-sqlite]
FILENAME = $GNUNET_DATA_HOME/namecache/sqlite.db

[namestore]
START_ON_DEMAND = YES
RUN_PER_USER = YES
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-namestore.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
HOSTNAME = localhost
BINARY = gnunet-service-namestore
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
DATABASE = sqlite
CACHE_KEYS = YES

[namestore-sqlite]
INIT_ON_CONNECT = YES
FILENAME = $GNUNET_DATA_HOME/namestore/sqlite.db

[uri]
gns = gnunet-namestore -e 1a -u

[nat]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-nat
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-nat.sock
UNIX_MATCH_UID = YES
UNIX_MATCH_GID = YES
ENABLE_UPNP = NO
ENABLE_IPSCAN = YES
DISABLEV6 = NO
HOSTNAME_DNS_FREQUENCY = 20 min
IFC_SCAN_FREQUENCY = 15 min
DYNDNS_FREQUENCY = 7 min
USE_STUN = YES
STUN_FREQUENCY = 5 min
STUN_SERVERS = stun.gnunet.org stun.services.mozilla.com:3478 stun.ekiga.net:3478
STUN_STALE = 60 min

[nse]
START_ON_DEMAND = YES
IMMEDIATE_START = YES
HOSTNAME = localhost
BINARY = gnunet-service-nse
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-nse.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
PROOFFILE = $GNUNET_DATA_HOME/nse/proof.dat
HISTOGRAM_DIR = $GNUNET_CACHE_HOME/nse/histogram
WORKDELAY = 5 ms
INTERVAL = 1 h
WORKBITS = 15

[peerstore]
IMMEDIATE_START = YES
USE_INCLUDED_HELLOS = YES
HOSTNAME = localhost
BINARY = gnunet-service-peerstore
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-peerstore.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
DATABASE = sqlite

[peerstore-sqlite]
FILENAME = $GNUNET_DATA_HOME/peerstore/sqlite.db

[reclaim]
START_ON_DEMAND = YES
RUN_PER_USER = YES
HOSTNAME = localhost
BINARY = gnunet-service-reclaim
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_USER_RUNTIME_DIR/gnunet-service-reclaim.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
TICKET_REFRESH_INTERVAL = 6h

[regex]
START_ON_DEMAND = YES
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-regex.sock
HOSTNAME = localhost
BINARY = gnunet-service-regex
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;

[resolver]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-resolver
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-resolver.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = NO

[revocation]
START_ON_DEMAND = YES
IMMEDIATE_START = YES
HOSTNAME = localhost
BINARY = gnunet-service-revocation
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-revocation.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
WORKBITS = 22
EPOCH_DURATION = 365 d
DATABASE = $GNUNET_DATA_HOME/revocation.dat

[statistics]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-statistics
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-statistics.sock
UNIX_MATCH_UID = NO
UNIX_MATCH_GID = YES
DATABASE = $GNUNET_DATA_HOME/statistics.dat

[set]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-set
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-set.sock
UNIX_MATCH_UID = YES
UNIX_MATCH_GID = YES

[transport]
START_ON_DEMAND = YES
HOSTNAME = localhost
BINARY = gnunet-service-transport
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;
UNIXPATH = $GNUNET_RUNTIME_DIR/gnunet-service-transport.sock

[communicator-tcp]
BINDTO = 2086
DISABLE_V6 = YES
BINARY = gnunet-communicator-tcp
IMMEDIATE_START = YES

[communicator-udp]
BINARY = gnunet-communicator-udp
BINDTO = 2086
DISABLE_V6 = YES
IMMEDIATE_START = YES
DISABLE_BROADCAST = NO

[PEER]
PRIVATE_KEY = /data/user/0/org.gnu.gnunet/files/private_key.ecc
SYSTEM_TYPE = UNKNOWN

[PATHS]
GNUNET_HOME = /data/user/0/org.gnu.gnunet/files/home
GNUNET_DATA_HOME = $GNUNET_HOME/data
GNUNET_CONFIG_HOME = $GNUNET_HOME/config
GNUNET_CACHE_HOME = $GNUNET_HOME/cache
GNUNET_RUNTIME_DIR = /data/user/0/org.gnu.gnunet/cache/gnunet-system-runtime
GNUNET_USER_RUNTIME_DIR = /data/user/0/org.gnu.gnunet/cache/gnunet-runtime
GNUNET_TMP = /data/user/0/org.gnu.gnunet/cache

